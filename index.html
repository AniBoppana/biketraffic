<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bike Traffic</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <!-- Mapbox GL JS CSS -->
    <link
    href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css"
    rel="stylesheet"
    />
    <script src="map.js" type="module"></script>
  </head>
  <body>
    <header style="display: flex; gap: 1em; align-items: baseline; width: 90%;">
      <h1>Bike Traffic</h1>
      <label style="margin-left: auto; text-align: right; display: block;">
        Filter by time:
        <input id="time-slider" type="range" min="-1" max="1439" value="-1" step="1" style="width: 350px;">
        <br>
        <span style="display: flex; flex-direction: column; align-items: flex-end;">
          <time id="selected-time" style="display: inline-block;"></time>
          <em id="any-time" style="color: #888; font-style: italic; display: inline-block;">(any time)</em>
        </span>
      </label>
    </header>
    <div id="map">
      <svg></svg>
    </div>
    <div class="legend">
      <div><span class="legend-dot" style="--departure-ratio: 1"></span>More departures</div>
      <div><span class="legend-dot" style="--departure-ratio: 0.5"></span>Balanced</div>
      <div><span class="legend-dot" style="--departure-ratio: 0"></span>More arrivals</div>
    </div>
  </body>
</html>
